name: Release

"on":
  workflow_dispatch:
    inputs:
      tag:
        description: Existing SemVer tag to publish, for example 0.1.0-rc.1
        required: true
        type: string
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Publish Swift package
    runs-on: macos-26
    timeout-minutes: 90
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi
          if [[ ! "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: release tag must be SemVer, for example 0.1.0 or 0.1.0-rc.1"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Install validation tools
        run: brew install swiftlint llvm

      - name: Validate
        run: ./scripts/ci/validate.sh

      - name: Build source archive
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: ./scripts/release/archive-source.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: SwifterKit-${{ steps.release.outputs.tag }}
          path: .build/release-artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          args=(
            release create "$RELEASE_TAG"
            .build/release-artifacts/*
            --title "SwifterKit $RELEASE_TAG"
            --generate-notes
            --verify-tag
          )
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
